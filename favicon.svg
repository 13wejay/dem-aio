<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Mountain gradient -->
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Grid lines (subtle topographic feel) -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1">
    <line x1="64" y1="160" x2="448" y2="160"/>
    <line x1="64" y1="224" x2="448" y2="224"/>
    <line x1="64" y1="288" x2="448" y2="288"/>
    <line x1="64" y1="352" x2="448" y2="352"/>
    <line x1="128" y1="96" x2="128" y2="416"/>
    <line x1="192" y1="96" x2="192" y2="416"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <line x1="320" y1="96" x2="320" y2="416"/>
    <line x1="384" y1="96" x2="384" y2="416"/>
  </g>

  <!-- Back mountain (purple/indigo) -->
  <path d="M64 400 L180 180 L240 260 L300 140 L420 320 L448 400 Z" 
        fill="url(#mountain2)" opacity="0.5" filter="url(#shadow)"/>

  <!-- Front mountain (cyan/blue) -->
  <path d="M64 400 L140 240 L200 310 L280 160 L340 260 L380 220 L448 400 Z" 
        fill="url(#mountain1)" filter="url(#shadow)"/>

  <!-- Contour lines on front mountain -->
  <g fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.35" stroke-linecap="round">
    <path d="M100 360 Q180 310 220 330 Q260 350 300 300 Q340 280 400 360"/>
    <path d="M140 320 Q200 270 240 290 Q280 310 310 260 Q340 240 390 310"/>
    <path d="M180 280 Q220 240 260 250 Q290 260 310 220 Q330 200 370 260"/>
    <path d="M230 230 Q260 210 280 210 Q300 200 320 190"/>
  </g>

  <!-- Snow cap highlight -->
  <path d="M268 160 L280 160 L284 168 L276 172 L268 168 Z" 
        fill="#ffffff" opacity="0.7"/>

  <!-- Elevation point marker -->
  <g filter="url(#glow)">
    <circle cx="280" cy="160" r="8" fill="#f472b6" opacity="0.9"/>
    <circle cx="280" cy="160" r="4" fill="#ffffff"/>
  </g>

  <!-- "DEM" text -->
  <text x="256" y="460" text-anchor="middle" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="800" font-size="64" letter-spacing="12"
        fill="#e2e8f0" opacity="0.9">DEM</text>
</svg>
